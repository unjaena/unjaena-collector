name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "thin-collector-v*"
      - "collector-thin-v*"
      - "collector-v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .
      - run: python tools/public_preflight.py
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile src/unjaena_collector/cli.py src/unjaena_collector/client.py src/unjaena_collector/runner.py src/unjaena_collector/gui.py src/unjaena_collector/models.py src/unjaena_collector/desktop.py tools/build_desktop.py tools/package_desktop.py tools/checksums.py tools/sign_macos.py

  desktop:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .[desktop]
      - run: python tools/build_desktop.py
      - name: Sign macOS app
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          UNJAENA_SIGNING_REQUIRED: "1"
        run: python tools/sign_macos.py
      - run: python tools/package_desktop.py
      - run: python tools/checksums.py
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true

  wheel:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip wheel --no-deps . -w release
      - run: python tools/checksums.py
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
