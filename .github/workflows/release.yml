name: Build & Release Collector

on:
  push:
    tags:
      - 'collector-v*'

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  GITHUB_REPO: ${{ github.repository }}

jobs:
  # =========================================================================
  # Windows x64 — .exe (PyInstaller onefile)
  # =========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        # NOTE: For supply-chain safety, consider using requirements/base.lock.txt
        # (generated via `pip freeze`) for deterministic, reproducible builds.
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/windows.txt
          pip install pyinstaller

      - name: Prepare config with version
        shell: bash
        env:
          SERVER_URL: ${{ secrets.PRODUCTION_SERVER_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME#collector-v}"
          python -c "
          import json, os
          server_url = os.environ.get('SERVER_URL', 'https://YOUR_SERVER_URL')
          ws_url = server_url.replace('https://', 'wss://').replace('http://', 'ws://')
          if os.path.exists('config.production.json'):
              with open('config.production.json', encoding='utf-8') as f: c = json.load(f)
              if server_url != 'https://YOUR_SERVER_URL':
                  c['server_url'] = server_url
                  c['ws_url'] = ws_url
          else:
              c = {'server_url':server_url,'ws_url':ws_url,'dev_mode':False,'allow_insecure':False,'app_name':'Digital Intelligence Collector'}
          c['version'] = '${VERSION}'
          with open('config.production.json', 'w', encoding='utf-8') as f: json.dump(c, f, indent=4)
          print(f'[CONFIG] version={c[\"version\"]}, server_url={c.get(\"server_url\",\"N/A\")}')
          "

      - name: Download ADB platform-tools (Apache-2.0)
        shell: bash
        run: |
          curl -sL -o /tmp/platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-windows.zip
          unzip -o /tmp/platform-tools.zip -d /tmp/
          mkdir -p resources/adb
          cp /tmp/platform-tools/adb.exe resources/adb/
          cp /tmp/platform-tools/AdbWinApi.dll resources/adb/
          cp /tmp/platform-tools/AdbWinUsbApi.dll resources/adb/
          echo "[ADB] Bundled $(resources/adb/adb.exe version 2>/dev/null | head -1)"

      - name: Build EXE
        run: python build.py --production --ci --skip-usb-check

      - name: Rename with version
        working-directory: dist
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#collector-v}"
          mv IntelligenceCollector.exe "IntelligenceCollector-${VERSION}-windows-x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/IntelligenceCollector-*-windows-x64.exe

  # =========================================================================
  # Linux x64 — .tar.gz (PyInstaller onefile)
  # =========================================================================
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libxcb-cursor0 libxcb-xinerama0 libgl1

      - name: Install Python dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/linux.txt
          pip install pyinstaller

      - name: Prepare config with version
        env:
          SERVER_URL: ${{ secrets.PRODUCTION_SERVER_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME#collector-v}"
          python -c "
          import json, os
          server_url = os.environ.get('SERVER_URL', 'https://YOUR_SERVER_URL')
          ws_url = server_url.replace('https://', 'wss://').replace('http://', 'ws://')
          if os.path.exists('config.production.json'):
              with open('config.production.json', encoding='utf-8') as f: c = json.load(f)
              if server_url != 'https://YOUR_SERVER_URL':
                  c['server_url'] = server_url
                  c['ws_url'] = ws_url
          else:
              c = {'server_url':server_url,'ws_url':ws_url,'dev_mode':False,'allow_insecure':False,'app_name':'Digital Intelligence Collector'}
          c['version'] = '${VERSION}'
          with open('config.production.json', 'w', encoding='utf-8') as f: json.dump(c, f, indent=4)
          print(f'[CONFIG] version={c[\"version\"]}, server_url={c.get(\"server_url\",\"N/A\")}')
          "

      - name: Build Linux binary
        run: python build.py --production --ci --skip-usb-check

      - name: Package tar.gz
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF_NAME#collector-v}"
          chmod +x IntelligenceCollector
          tar czf "IntelligenceCollector-${VERSION}-linux-x64.tar.gz" IntelligenceCollector

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/IntelligenceCollector-*-linux-x64.tar.gz

  # =========================================================================
  # macOS ARM64 (Apple Silicon) — .dmg
  # =========================================================================
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          brew install libusb create-dmg || true
          pip install -r requirements/base.txt
          pip install -r requirements/macos.txt
          pip install pyinstaller

      - name: Prepare config with version
        env:
          SERVER_URL: ${{ secrets.PRODUCTION_SERVER_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME#collector-v}"
          python3 -c "
          import json, os
          server_url = os.environ.get('SERVER_URL', 'https://YOUR_SERVER_URL')
          ws_url = server_url.replace('https://', 'wss://').replace('http://', 'ws://')
          if os.path.exists('config.production.json'):
              with open('config.production.json', encoding='utf-8') as f: c = json.load(f)
              if server_url != 'https://YOUR_SERVER_URL':
                  c['server_url'] = server_url
                  c['ws_url'] = ws_url
          else:
              c = {'server_url':server_url,'ws_url':ws_url,'dev_mode':False,'allow_insecure':False,'app_name':'Digital Intelligence Collector'}
          c['version'] = '${VERSION}'
          with open('config.production.json', 'w', encoding='utf-8') as f: json.dump(c, f, indent=4)
          print(f'[CONFIG] version={c[\"version\"]}, server_url={c.get(\"server_url\",\"N/A\")}')
          "

      - name: Build macOS binary
        run: python build.py --production --ci --skip-usb-check

      # -----------------------------------------------------------------
      # Code Signing + Notarization
      # -----------------------------------------------------------------
      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Sign app bundle
        working-directory: dist
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -d "IntelligenceCollector.app" ]; then
            echo "[SIGN] Signing IntelligenceCollector.app..."
            codesign --deep --force --options runtime \
              --entitlements ../entitlements.plist \
              --sign "$MACOS_SIGNING_IDENTITY" \
              IntelligenceCollector.app

            echo "[SIGN] Verifying signature..."
            codesign --verify --deep --strict --verbose=2 IntelligenceCollector.app
            echo "[SIGN] Done."
          else
            echo "[SIGN] No .app bundle found, skipping signing"
          fi

      - name: Create DMG
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF_NAME#collector-v}"
          DMG_NAME="IntelligenceCollector-${VERSION}-macos-arm64.dmg"

          if [ -d "IntelligenceCollector.app" ]; then
            create-dmg \
              --volname "Intelligence Collector" \
              --window-size 600 400 \
              --icon-size 100 \
              --icon "IntelligenceCollector.app" 175 190 \
              --app-drop-link 425 190 \
              --no-internet-enable \
              "${DMG_NAME}" \
              "IntelligenceCollector.app" 2>/dev/null || \
            hdiutil create -volname "IntelligenceCollector" \
              -srcfolder IntelligenceCollector.app \
              -ov -format UDZO \
              "${DMG_NAME}"
          else
            chmod +x IntelligenceCollector
            tar czf "IntelligenceCollector-${VERSION}-macos-arm64.tar.gz" IntelligenceCollector
          fi

      - name: Notarize DMG
        working-directory: dist
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_FILE=$(ls IntelligenceCollector-*-macos-arm64.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ] && [ -n "$APPLE_ID" ]; then
            echo "[NOTARIZE] Submitting $DMG_FILE..."
            # Apple notarization queue latency occasionally exceeds 30 min
            # under load (observed one-off > 30m on 2026-04-13). 60m
            # matches the enclosing job timeout and leaves headroom before
            # the GitHub Actions runner hard-limits the job.
            xcrun notarytool submit "$DMG_FILE" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 60m

            echo "[NOTARIZE] Stapling ticket..."
            xcrun stapler staple "$DMG_FILE"
            echo "[NOTARIZE] Done."
          else
            echo "[NOTARIZE] Skipped (no DMG or credentials missing)"
          fi

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            dist/IntelligenceCollector-*-macos-arm64.dmg
            dist/IntelligenceCollector-*-macos-arm64.tar.gz

  # NOTE: macOS x64 (Intel) build removed — GitHub Actions deprecated macos-13 runners.
  # Apple Silicon (ARM64) build covers macOS via Rosetta 2 compatibility.

  # =========================================================================
  # Release — SHA256 + GitHub Release 생성
  # =========================================================================
  release:
    needs: [build-windows, build-linux]
    if: always() && needs.build-windows.result == 'success' && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          find . -type f \( -name "*.exe" -o -name "*.tar.gz" -o -name "*.dmg" \) | while read f; do
            sha256sum "$f" | sed "s|  \./[^/]*/|  |" >> ../SHA256SUMS.txt
          done
          cat ../SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Intelligence Collector ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.tar.gz
            release-assets/**/*.dmg
            SHA256SUMS.txt
