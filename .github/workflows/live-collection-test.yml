name: Public collector smoke test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'requirements/**'
      - 'tools/public_preflight.py'
      - 'tools/gui_workflow_smoke.py'
      - 'tools/encase/**'
      - 'README.md'
      - 'SECURITY.md'
      - 'LICENSES.md'
      - '.github/workflows/live-collection-test.yml'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  smoke:
    name: Public snapshot smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install GUI system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxcb-cursor0 libxcb-xinerama0
      - name: Install runtime dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/linux.txt
      - name: Public preflight
        run: python tools/public_preflight.py
      - name: Compile source
        run: PYTHONPATH=src python -m compileall -q src build.py tools/public_preflight.py tools/gui_workflow_smoke.py
      - name: GUI workflow smoke
        run: QT_QPA_PLATFORM=offscreen PYTHONPATH=src python tools/gui_workflow_smoke.py
      - name: Import upload stack
        run: |
          PYTHONPATH=src python - <<'PY'
          from core.uploader import SyncUploader, R2DirectUploader
          print(SyncUploader.__name__, R2DirectUploader.__name__)
          PY

  encase-bridge:
    name: EnCase bridge build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build EnCase .NET bridge
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
          )
          $msbuild = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found on runner" }
          & $msbuild tools\encase\dotnet\UnjaenaEncaseBridge.csproj /restore /p:Configuration=Release /p:Platform=AnyCPU
