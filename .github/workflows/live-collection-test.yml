name: Public collector smoke test

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'requirements/**'
      - 'tools/public_preflight.py'
      - '.github/workflows/live-collection-test.yml'

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  smoke:
    name: Public snapshot smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install runtime dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/linux.txt
      - name: Public preflight
        run: python tools/public_preflight.py
      - name: Compile source
        run: PYTHONPATH=src python -m compileall -q src build.py tools/public_preflight.py
      - name: Import upload stack
        run: |
          PYTHONPATH=src python - <<'PY'
          from core.uploader import SyncUploader, R2DirectUploader
          print(SyncUploader.__name__, R2DirectUploader.__name__)
          PY
